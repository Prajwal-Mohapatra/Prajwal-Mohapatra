name: Generate Snake

on:
  schedule:
    - cron: "0 0 * * *"   # Runs every day at midnight UTC
  workflow_dispatch:        # Allows manual trigger from Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk@v3
        with:
          github_user_name: Prajwal-Mohapatra
          outputs: dist/snake.svg

      - uses: crazy-max/ghaction-github-pages@v3
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
```

---

**Step 3 — Enable Workflow Permissions**

Go to your repo → **Settings** → **Actions** → **General** → scroll down to **Workflow permissions** → select **Read and write permissions** → Save.

---

**Step 4 — Run the Workflow Manually (First Time)**

Go to your repo → **Actions** tab → click **Generate Snake** on the left → click **Run workflow** → **Run workflow** (green button). Wait about 30–60 seconds for it to complete. This generates the `snake.svg` and pushes it to a branch called `output`.

---

**Step 5 — Verify the SVG Exists**

After the workflow runs, check that this URL works in your browser (replace with your username):
```
https://raw.githubusercontent.com/Prajwal-Mohapatra/Prajwal-Mohapatra/output/snake.svg
